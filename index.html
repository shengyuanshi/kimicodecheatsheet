  <style>
    :root {
      --bg: #f4f8fb;
      --panel: #ffffff;
      --ink: #071e31;
      --muted: #5d6b76;
      --line: #d8e1e8;
      --blue: #0a7aff;
      --navy: #043153;
      --sky: #81c4ff;
      --shadow: 0 18px 48px rgba(4, 49, 83, .16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(244, 248, 251, .92);
      backdrop-filter: blur(16px);
    }

    .title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 850;
      color: var(--navy);
      overflow: hidden;
    }

    .title div {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title img {
      width: 50px;
      height: 34px;
      display: block;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      gap: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      min-height: 34px;
      padding: 0 13px;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button[aria-pressed="true"] {
      color: #fff;
      background: var(--navy);
    }

    .download {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 8px 20px rgba(10, 122, 255, .2);
    }

    .download:disabled {
      cursor: wait;
      opacity: .68;
    }

    .updated {
      min-width: 184px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--navy);
      text-align: right;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 850;
    }

    .updated span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-items: center;
      padding: 14px 18px 16px;
      overflow: hidden;
    }

    .mockup-shell {
      width: max-content;
      max-width: 100%;
      margin: auto;
      transition: transform .18s ease;
    }

    .mockup-frame {
      display: grid;
      grid-template-rows: 26px auto;
      padding: 10px;
      border: 1px solid #cbd8e2;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #eef4f8 100%);
      box-shadow: 0 18px 44px rgba(4, 49, 83, .16), inset 0 0 0 1px rgba(255, 255, 255, .85);
    }

    .mockup-frame.portrait {
      border-radius: 22px;
      padding: 11px;
    }

    .mockup-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .mockup-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .mockup-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aab8c3;
    }

    .mockup-dots span:first-child {
      background: #ff6b5f;
    }

    .mockup-dots span:nth-child(2) {
      background: #ffbf3f;
    }

    .mockup-dots span:nth-child(3) {
      background: #45c568;
    }

    .preview {
      position: relative;
      margin: 0 auto;
      border: 1px solid #cfdae3;
      border-radius: 10px;
      box-shadow: none;
      background: #eff9ff;
      overflow: hidden;
    }

    .mockup-frame.portrait .preview {
      border-radius: 12px;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: 0;
      transform-origin: top left;
      background: #eff9ff;
    }

    .status {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      min-height: 20px;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
        align-items: stretch;
        padding: 10px 12px;
      }

      .controls {
        justify-content: space-between;
      }

      .segmented {
        flex: 1;
      }

      .updated {
        min-width: 0;
        text-align: left;
      }

      .stage {
        padding: 10px 10px 12px;
      }
    }
  </style>
</head>

    const enMap = Object.fromEntries(Object.entries(zhMap).map(([en, zh]) => [zh, en]));

    const frame = document.getElementById("sheetFrame");
    const mockupShell = document.getElementById("mockupShell");
    const mockupFrame = document.getElementById("mockupFrame");
    const mockupLabel = document.getElementById("mockupLabel");
    const preview = document.getElementById("preview");
    const status = document.getElementById("status");
    const downloadButton = document.getElementById("download");
    const modeButtons = [...document.querySelectorAll("[data-mode]")];
    const langButtons = [...document.querySelectorAll("[data-lang]")];
    const initialParams = new URLSearchParams(window.location.search);
    let currentMode = modes[initialParams.get("mode")] ? initialParams.get("mode") : "portrait";
    let currentLang = uiText[initialParams.get("lang")] ? initialParams.get("lang") : "zh";
    let naturalSize = { width: 1600, height: 1600 };
    let resizeTimer;

    function updateUiLanguage() {
      const text = uiText[currentLang];
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
      document.querySelector(".title div").textContent = text.appTitle;
      mockupLabel.textContent = text.appTitle;
      document.querySelector("[data-mode='portrait']").textContent = text.portrait;
      document.querySelector("[data-mode='landscape']").textContent = text.landscape;
      downloadButton.textContent = text.download;
      const updated = document.getElementById("updated");
      updated.innerHTML = `<span>${text.updatedLabel}</span>${text.updatedDate}`;
      document.querySelector(".stage").setAttribute("aria-label", text.previewLabel);
      langButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.lang === currentLang));
      });
    }

    function measureSheet() {
      const doc = frame.contentDocument;
      const sheet = doc && doc.querySelector(".sheet");
      if (!sheet) return naturalSize;
      const rect = sheet.getBoundingClientRect();
      return {
        width: Math.ceil(rect.width || sheet.scrollWidth || 1600),
        height: Math.ceil(rect.height || sheet.scrollHeight || doc.body.scrollHeight || 1200)
      };
    }

    function fitPreview() {
      naturalSize = measureSheet();
      const stage = document.querySelector(".stage");
      const statusHeight = status.offsetHeight + 10;
      const chromeHeight = 26;
      const framePadding = currentMode === "portrait" ? 22 : 20;
      const verticalBreathingRoom = 34;
      const availableWidth = Math.max(300, stage.clientWidth - 8 - framePadding);
      const availableHeight = Math.max(260, stage.clientHeight - statusHeight - chromeHeight - framePadding - verticalBreathingRoom);
      const scale = Math.min(1, availableWidth / naturalSize.width, availableHeight / naturalSize.height);
      preview.style.width = `${Math.round(naturalSize.width * scale)}px`;
      preview.style.height = `${Math.round(naturalSize.height * scale)}px`;
      frame.style.width = `${naturalSize.width}px`;
      frame.style.height = `${naturalSize.height}px`;
      frame.style.transform = `scale(${scale})`;
      mockupShell.style.maxWidth = `${Math.round(naturalSize.width * scale + framePadding)}px`;
      status.textContent = `${modes[currentMode].labels[currentLang]} · ${naturalSize.width} × ${naturalSize.height}px`;
    }

    function applySheetLanguage() {
      const doc = frame.contentDocument;
      if (!doc) return;
      const map = currentLang === "zh" ? zhMap : enMap;
      doc.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
      if (doc.title && map[doc.title]) doc.title = map[doc.title];
      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach((node) => {
        const original = node.nodeValue;
        const trimmed = original.trim();
        if (!trimmed || !map[trimmed]) return;
        node.nodeValue = original.replace(trimmed, map[trimmed]);
      });
    }

    function setMode(mode) {
      currentMode = mode;
      mockupFrame.classList.toggle("portrait", mode === "portrait");
      mockupFrame.classList.toggle("landscape", mode === "landscape");
      modeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
      });
      status.textContent = uiText[currentLang].loading;
      frame.src = modes[mode].src;
    }

    function setLanguage(lang) {
      currentLang = lang;
      updateUiLanguage();
      applySheetLanguage();
      fitPreview();
    }

    async function downloadCurrentSheet() {
      if (!window.html2canvas) {
        status.textContent = uiText[currentLang].libraryLoading;
        return;
      }

      const doc = frame.contentDocument;
      const sheet = doc && doc.querySelector(".sheet");
      if (!sheet) return;

      downloadButton.disabled = true;
      downloadButton.textContent = uiText[currentLang].generating;
      status.textContent = uiText[currentLang].generatingPng;

      try {
        const size = measureSheet();
        const canvas = await window.html2canvas(sheet, {
          backgroundColor: "#eff9ff",
          scale: 2,
          width: size.width,
          height: size.height,
          windowWidth: size.width,
          windowHeight: size.height,
          useCORS: true
        });
        const link = document.createElement("a");
        link.download = modes[currentMode].filenames[currentLang];
        link.href = canvas.toDataURL("image/png");
        link.click();
        status.textContent = `${uiText[currentLang].generated} ${modes[currentMode].labels[currentLang]} PNG`;
      } catch (error) {
        status.textContent = uiText[currentLang].failed;
        console.error(error);
      } finally {
        downloadButton.disabled = false;
        downloadButton.textContent = uiText[currentLang].download;
      }
    }

    frame.addEventListener("load", () => {
      applySheetLanguage();
      fitPreview();
      requestAnimationFrame(() => {
        applySheetLanguage();
        fitPreview();
      });
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    langButtons.forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    downloadButton.addEventListener("click", downloadCurrentSheet);
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fitPreview, 80);
    });

    updateUiLanguage();
    setMode(currentMode);
  </script>
